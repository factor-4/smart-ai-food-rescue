name: AI Service CI
on:
  push:
    paths: [services/ai-agent/**]
jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r services/ai-agent/requirements.txt
      - run: cd services/ai-agent && python -m pytest -q
      - uses: docker/setup-buildx-action@v3
      - run: docker build -t ai-agent services/ai-agent
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ai-agent
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH